          <h1 class="project-heading">Advertising Art Competition</h1>
          <p class="project-desc" data-series-desc>围绕 SKULLPANDA 系列展开的感性叙事实验。设计逻辑基于“玩具改变我们”的情感内核，采用柔和的低饱和色彩与多维分层的版式，探讨潮流玩具作为情感寄托的身份认同。文字与画面的交织，旨在呈现一种属于当代青年的“平静下的力量感”。</p>
          <template data-series-copy="popmart">围绕 SKULLPANDA 系列展开的感性叙事实验。设计逻辑基于“玩具改变我们”的情感内核，采用柔和的低饱和色彩与多维分层的版式，探讨潮流玩具作为情感寄托的身份认同。文字与画面的交织，旨在呈现一种属于当代青年的“平静下的力量感”。</template>
          <template data-series-copy="wahaha">本项目为娃哈哈“咖位”咖啡的年轻化重构。以高饱和度的波普插画风格（Pop Art）为核心，将复古潮流与现代职场心态融合。通过明快的色彩撞击与灵动的角色设计，精准捕捉 Z 世代“自带咖位”的自信姿态，实现品牌从传统饮品向潮流符号的视觉跨越。</template>
