<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sebastian’s Archive</title>
  <style>
* {
  box-sizing: border-box;
}

html {
  background: #000;
}

@keyframes page-out {
  from {
    opacity: 1;
  }
  to {
    opacity: .18;
  }
}

@keyframes page-in {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

body {
  margin: 0;
  min-width: 320px;
  background: #000;
  color: #fff;
  font-family: "Times New Roman", "Noto Serif SC", Georgia, serif;
}

body.is-entering .page-shell {
  animation: none;
}

body.has-motion-bridge .page-shell {
  animation: none !important;
}

body.is-leaving .page-shell {
  animation: none;
  pointer-events: none;
}

#single-app {
  min-height: 100vh;
  background: #000;
  isolation: isolate;
}

#single-app.route-fade {
  opacity: 0;
  filter: blur(2px);
  transform: translate3d(0, 8px, 0);
}

#single-app.route-fade-in {
  opacity: 1;
  filter: blur(0);
  transform: translate3d(0, 0, 0);
  transition: opacity 520ms cubic-bezier(.25, .72, .2, 1), filter 520ms cubic-bezier(.25, .72, .2, 1), transform 520ms cubic-bezier(.25, .72, .2, 1);
}

.page-ghost {
  position: fixed;
  inset: 0;
  z-index: 18;
  overflow: hidden;
  pointer-events: none;
  background: #000;
  transform: translate3d(0, var(--ghost-scroll, 0px), 0);
  opacity: 1;
  filter: blur(0);
  transition: opacity 1180ms cubic-bezier(.12, .72, .18, 1), filter 1180ms cubic-bezier(.12, .72, .18, 1);
}

@keyframes fallback-enter {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes fallback-leave {
  from {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  to {
    opacity: .08;
    transform: translateY(-10px);
  }
}

img,
video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

a {
  color: inherit;
  text-decoration: none;
}

.page-shell {
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
  background: #000;
}

.motion-bridge-layer {
  position: fixed;
  inset: 0;
  z-index: 90;
  pointer-events: none;
  overflow: visible;
}

.motion-bridge-item {
  position: fixed;
  left: 0;
  top: 0;
  overflow: hidden;
  transform-origin: top left;
  will-change: transform, opacity, filter;
  backface-visibility: hidden;
  contain: layout paint;
}

.motion-bridge-item img,
.motion-bridge-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.motion-bridge-item.is-logo img {
  object-fit: contain;
}

.motion-bridge-text {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  color: #fff;
  font: inherit;
  white-space: nowrap;
}

.motion-bridge-target-hidden {
  opacity: 0 !important;
}

.home-piece-waiting {
  opacity: 0;
}

.home-stack-waiting {
  opacity: 0;
}

.home-stack-entering {
  animation: home-stack-enter 720ms cubic-bezier(.25, .72, .2, 1) both;
}

@keyframes home-stack-enter {
  from {
    opacity: 0;
    filter: blur(3px);
  }
  to {
    opacity: 1;
    filter: blur(0);
  }
}

.viewport {
  position: relative;
  margin: 0 auto;
  overflow: hidden;
  background: #000;
}

.artboard {
  position: absolute;
  left: 0;
  top: 0;
  width: 2987px;
  background: #000;
  transform-origin: top left;
  overflow: hidden;
}

.layer {
  position: absolute;
}

.shadow-soft {
  box-shadow: 0 12px 32px rgba(0, 0, 0, .2), 0 4px 12px rgba(0, 0, 0, .25);
}

.shadow-deep {
  box-shadow: 0 20px 60px rgba(0, 0, 0, .72);
}

.home-stack {
  isolation: isolate;
}

.home-piece {
  transform-origin: center center;
  will-change: transform;
  transition: transform .42s cubic-bezier(.2, .78, .18, 1), box-shadow .28s ease;
}

.home-piece.is-raised {
  z-index: 40 !important;
}

.home-piece[data-piece]:hover,
.home-piece[data-piece]:focus-visible {
  z-index: 40 !important;
  transform: var(--hover-transform, scale(1.035)) !important;
}

img.home-piece,
.home-piece > img,
.home-directory-card > img {
  object-fit: fill;
}

.home-directory-card {
  overflow: visible;
}

.home-directory-card > img {
  pointer-events: none;
}

.menu-card {
  transform-origin: center center;
  transition: transform .38s cubic-bezier(.2, .78, .18, 1);
  will-change: transform;
}

.menu-card:hover,
.menu-card:focus-visible {
  z-index: 35 !important;
  transform: scale(1.035);
}

.menu-concept-card {
  cursor: default;
}

.menu-concept-card > img {
  object-fit: fill;
  pointer-events: none;
}

.menu-concept-card .concept-list {
  left: 56.32px;
  top: 388.26px;
}

.menu-hold-preview {
  position: fixed;
  inset: 0;
  z-index: 950;
  display: grid;
  place-items: center;
  padding: 68px 22px 38px;
  background: rgba(0, 0, 0, .72);
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s ease;
  backdrop-filter: blur(10px);
}

.menu-hold-preview.is-open {
  opacity: 1;
  pointer-events: auto;
}

.menu-hold-preview img {
  width: auto;
  height: auto;
  max-width: min(82vw, 760px);
  max-height: 82vh;
  object-fit: contain;
  box-shadow: 0 26px 80px rgba(0, 0, 0, .72);
  transform: translateY(16px) scale(.96);
  opacity: .001;
  transition: transform .34s cubic-bezier(.2, .78, .18, 1), opacity .24s ease;
}

.menu-hold-preview.is-open img {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.menu-hold-preview-label {
  position: fixed;
  left: 50%;
  top: 22px;
  transform: translateX(-50%);
  color: #fff;
  font-family: "Kyiv*Type Serif", "KyivType Serif", "Times New Roman", serif;
  font-size: 28px;
  line-height: 1;
  pointer-events: none;
}

.menu-card-about,
.menu-card-connect {
  -webkit-touch-callout: none;
  user-select: none;
}

.summary-card,
.project-card {
  transform-origin: center center;
  transition: transform .38s cubic-bezier(.2, .78, .18, 1), box-shadow .28s ease;
  will-change: transform;
}

.summary-bag {
  z-index: 1;
  transform-origin: center center;
  will-change: transform, opacity, filter;
}

.portfolio-bag-interactive {
  cursor: pointer;
  transition: transform 520ms cubic-bezier(.22, .78, .18, 1), filter 420ms ease, box-shadow 420ms ease;
}

.summary-bag.portfolio-bag-interactive:hover,
.summary-bag.portfolio-bag-interactive:focus-visible {
  transform: translate3d(0, -16px, 0) scale(1.012);
  filter: brightness(1.045) saturate(1.02);
  outline: 0;
}

.menu-card.portfolio-bag-interactive:hover,
.menu-card.portfolio-bag-interactive:focus-visible {
  transform: translate3d(0, -10px, 0) scale(1.028);
}

.portfolio-bag-pressed {
  animation: bag-press 360ms cubic-bezier(.25, .72, .2, 1) both;
}

@keyframes bag-press {
  0% {
    filter: brightness(1);
  }
  45% {
    filter: brightness(.96) saturate(.98);
  }
  100% {
    filter: brightness(1.035) saturate(1.02);
  }
}

.summary-card {
  z-index: 10;
}

.summary-card-waiting {
  opacity: 0;
}

.summary-card-entering {
  animation: summary-card-enter 1120ms cubic-bezier(.18, 1.08, .28, 1) both;
  animation-delay: var(--summary-enter-delay, 0ms);
}

@keyframes summary-card-enter {
  0% {
    opacity: 0;
    filter: blur(6px);
    transform: var(--summary-enter-from);
  }
  86% {
    opacity: 1;
    filter: blur(1px);
    transform: var(--summary-enter-over);
  }
  100% {
    opacity: 1;
    filter: blur(0);
    transform: var(--summary-enter-to);
  }
}

.summary-card:hover,
.summary-card:focus-visible {
  z-index: 35 !important;
  transform: var(--hover-transform, scale(1.035)) !important;
}

.project-card:hover,
.project-card:focus-visible {
  transform: translateY(-10px) scale(1.018);
}

.nav-text {
  position: absolute;
  z-index: 20;
  font-family: "Californian FB", "Times New Roman", serif;
  font-weight: 700;
  font-size: 48px;
  line-height: 1.15;
  white-space: nowrap;
}

.logo {
  position: absolute;
  z-index: 20;
  width: 436px;
  height: 245px;
}

.logo img {
  object-fit: contain;
}

.fixed-chrome-source {
  visibility: hidden;
}

.fixed-chrome-layer {
  position: fixed;
  inset: 0;
  z-index: 120;
  pointer-events: none;
}

.fixed-chrome-layer a {
  pointer-events: auto;
}

.fixed-chrome-clone {
  position: fixed !important;
  transform-origin: top left;
  will-change: left, top, transform, opacity;
  backface-visibility: hidden;
}

.fixed-work-backdrop {
  position: fixed;
  left: 0;
  top: 0;
  z-index: 110;
  width: 100vw;
  height: min(7vw, 76px);
  pointer-events: none;
  background: #000;
}

.fixed-work-backdrop::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: max(-1.7vw, -24px);
  height: min(1.9vw, 30px);
  background: linear-gradient(to bottom, rgba(0, 0, 0, .9), rgba(0, 0, 0, .28) 54%, rgba(0, 0, 0, 0));
  backdrop-filter: blur(5px);
}

.entry {
  display: grid;
  min-height: 100vh;
  place-items: center;
  padding: 48px 20px;
  background: #000;
}

.entry-panel {

}

.entry-logo {

}

.entry h1 {

}

.entry-grid {

.aigc-text {

.aigc-step {

.aigc-title {

.aigc-copy {

}

.project-meta {

.project-kicker {

.project-desc {

.work-side-meta .project-heading {

.work-side-meta .project-desc {

.work4-reflection {

.work4-reflection strong {

.work5-series-tabs {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 26px;
  margin-top: 76px;
}

.work5-series-tab {
  padding: 0;

  background: transparent;

  font-size: 62px;
  font-weight: 700;
  line-height: 1.06;

}

.work5-series-tab:hover,
.work5-series-tab:focus-visible {

}

.work5-series-tab.is-active {

}

.work5-series-card {

}

.work5-wahaha-card {
  z-index: 30 !important;
}

.work5-series-hidden {
  visibility: hidden;
  opacity: 0 !important;

  filter: blur(2px) brightness(.66);
  transform: translateY(18px) scale(.98) !important;
}

.project-index {

}

.project-card,

.project-card:hover,

}

.project-video {

.project-video:hover,

.project-text {

.reveal-item {

.project-text.reveal-item.is-visible:hover {

.popmart-swap-card {
  cursor: pointer;
  transition: left .56s cubic-bezier(.2, .78, .18, 1), top .56s cubic-bezier(.2, .78, .18, 1), width .56s cubic-bezier(.2, .78, .18, 1), height .56s cubic-bezier(.2, .78, .18, 1), filter .36s ease, opacity .36s ease, box-shadow .36s ease, transform .34s cubic-bezier(.2, .78, .18, 1);

.popmart-swap-card.reveal-item.is-visible[data-slot="center"]:hover {

.concept-title {

          <p class="project-desc">本项目为 Yves Saint Laurent 2026 夏季女装系列的视觉创意与版式实验。设计核心源于品牌内核中“双重性（Duality）”的探讨，即力量（Power）与优雅（Grace）之间的张力平衡。<br><br>视觉表达上，我采用了极简的高反差黑白摄影，建立了一套严格的对称式版式系统。在《POWER》篇章中，通过倒置的构图打破常规视域，传达一种柔软却不可动摇的内在生命力；而在《GRACE》篇章中，则通过模特深邃的目光与群像的层次，建立经典的法式优雅。</p>

      clone.classList.add("fixed-chrome-clone");
      clone.dataset.sourceLeft = String(item.offsetLeft);
      clone.dataset.sourceTop = String(item.offsetTop);
      clone.dataset.sourceWidth = String(item.offsetWidth);
      clone.dataset.sourceHeight = String(item.offsetHeight);
      layer.appendChild(clone);
    });
    if (isWorkPage(currentPage)) {
      var backdrop = document.createElement("div");
      backdrop.className = "fixed-work-backdrop";
      document.body.appendChild(backdrop);
    }
  }

  function updateFixedChrome() {
    var viewport = app.querySelector(".viewport");
    if (!viewport) return;
    var scale = Number(viewport.dataset.scale || 1);
    var rect = viewport.getBoundingClientRect();
    document.querySelectorAll(".fixed-chrome-clone").forEach(function (item) {
      item.style.left = rect.left + Number(item.dataset.sourceLeft || 0) * scale + "px";
      item.style.top = Number(item.dataset.sourceTop || 0) * scale + "px";
      item.style.width = item.dataset.sourceWidth + "px";
      item.style.height = item.dataset.sourceHeight + "px";
      item.style.transform = "scale(" + scale + ")";
    });
  }

  function setupHomeInteractions() {
    app.querySelectorAll(".home-stack").forEach(function (stack) {
      var pieces = stack.querySelectorAll(".home-piece[data-piece]");
      pieces.forEach(function (piece) {
        piece.dataset.baseTransform = piece.style.transform || "none";
        if (piece.dataset.hoverTransform) piece.style.setProperty("--hover-transform", piece.dataset.hoverTransform);
      });
      function activate(piece) {
        var name = piece.dataset.piece;
        pieces.forEach(function (target) {
          var active = target.dataset.piece === name;
          target.classList.toggle("is-raised", active);
          target.style.transform = active ? (target.dataset.hoverTransform || "scale(1.035)") : target.dataset.baseTransform;
        });
      }
      pieces.forEach(function (piece) {
        piece.addEventListener("pointerenter", function () { activate(piece); });
        piece.addEventListener("mouseenter", function () { activate(piece); });
      });
      stack.addEventListener("pointerleave", function () {
        pieces.forEach(function (target) {
          target.classList.remove("is-raised");
          target.style.transform = target.dataset.baseTransform;
        });
      });
    });
  }

  function pulseBag(bag) {
    bag.classList.remove("portfolio-bag-pressed");
    bag.offsetHeight;
    bag.classList.add("portfolio-bag-pressed");
    window.setTimeout(function () {
      bag.classList.remove("portfolio-bag-pressed");
    }, 380);
  }

  function setupBagInteractions() {
    app.querySelectorAll(".home-piece, .menu-card, .summary-bag").forEach(function (item) {
      if (elementAssetKey(item) !== "portfolio-bag") return;
      item.classList.add("portfolio-bag-interactive");
      item.addEventListener("pointerdown", function () { pulseBag(item); });
      item.addEventListener("keydown", function (event) {
        if (event.key === "Enter" || event.key === " ") pulseBag(item);
      });
      item.addEventListener("click", function (event) {
        if (currentPage === "summary" && item.classList.contains("summary-bag")) {
          event.preventDefault();
          pulseBag(item);
        }
      });
    });
  }

  function setupConceptItems() {
    app.querySelectorAll(".concept-title").forEach(function (button) {
      button.addEventListener("click", function () {
        var item = button.closest(".concept-item");
        var isOpen = item.classList.contains("is-open");
        app.querySelectorAll(".concept-item.is-open").forEach(function (openItem) { openItem.classList.remove("is-open"); });
        if (!isOpen) item.classList.add("is-open");
      });
    });
  }

  function setupMenuHoldPreview() {
    var cards = app.querySelectorAll(".menu-card-about, .menu-card-connect");
    if (!cards.length) return;
    var overlay = document.querySelector(".menu-hold-preview");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.className = "menu-hold-preview";
      overlay.setAttribute("role", "dialog");
      overlay.setAttribute("aria-modal", "true");
      overlay.innerHTML = '<span class="menu-hold-preview-label"></span><img alt="">';
      document.body.appendChild(overlay);
      overlay.addEventListener("click", function (event) {
        if (event.target === overlay) closePreview();
      });
    }
    var previewImg = overlay.querySelector("img");
    var previewLabel = overlay.querySelector(".menu-hold-preview-label");
    var closeTimer = 0;
    function closePreview() {
      window.clearTimeout(closeTimer);
      overlay.classList.remove("is-open");
      closeTimer = window.setTimeout(function () {
        if (!overlay.classList.contains("is-open")) {
          previewImg.removeAttribute("src");
          previewImg.alt = "";
          previewLabel.textContent = "";
        }
      }, 240);
    }
    function openPreview(card) {
      var img = card.querySelector("img");
      if (!img) return;
      previewImg.src = img.currentSrc || img.src;
      previewImg.alt = img.alt || "";
      previewLabel.textContent = card.classList.contains("menu-card-connect") ? "Connect" : "About Me";
      overlay.classList.add("is-open");
    }
    cards.forEach(function (card) {
      var pressTimer = 0;
      var openedByPress = false;
      var startX = 0;
      var startY = 0;
      function clearPress() {
        window.clearTimeout(pressTimer);
        pressTimer = 0;
      }
      card.addEventListener("pointerdown", function (event) {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        openedByPress = false;
        startX = event.clientX;
        startY = event.clientY;
        clearPress();
        pressTimer = window.setTimeout(function () {
          openedByPress = true;
          openPreview(card);
        }, 520);
      });
      card.addEventListener("pointermove", function (event) {
        if (!pressTimer) return;
        if (Math.abs(event.clientX - startX) > 12 || Math.abs(event.clientY - startY) > 12) clearPress();
      });
      ["pointerup", "pointercancel", "pointerleave"].forEach(function (name) {
        card.addEventListener(name, clearPress);
      });
      card.addEventListener("click", function (event) {
        if (!openedByPress) return;
        event.preventDefault();
        event.stopPropagation();
        openedByPress = false;
      }, true);
      card.addEventListener("contextmenu", function (event) {
        event.preventDefault();
      });
    });
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && overlay.classList.contains("is-open")) closePreview();
    });
  }

  function setupReveal() {
    var items = app.querySelectorAll(".project-card, .project-video, .project-text, .project-meta");
    items.forEach(function (item, index) {
      item.classList.add("reveal-item");
      item.style.transitionDelay = Math.min(index % 6, 4) * 45 + "ms";
      item.classList.add("is-visible");
    });
  }

  function setupMomentsCarousel() {
    app.querySelectorAll(".moments-carousel").forEach(function (carousel) {
      var slides = Array.prototype.slice.call(carousel.querySelectorAll(".moments-slide"));
      var prev = carousel.querySelector(".moments-control.prev");
      var next = carousel.querySelector(".moments-control.next");
      var current = 0;
      var dragStartX = 0;
      var dragStartY = 0;
      var dragPointerId = null;
      var didSwipe = false;
      var suppressClickUntil = 0;
      function wrap(index) { return (index % slides.length + slides.length) % slides.length; }
      function signedOffset(index) {
        var raw = index - current;
        var half = slides.length / 2;
        if (raw > half) raw -= slides.length;
        if (raw < -half) raw += slides.length;
        return raw;
      }
      function render() {
        slides.forEach(function (slide, index) {
          var offset = signedOffset(index);
          var distance = Math.abs(offset);
          var hidden = distance > 2;
          slide.classList.toggle("is-active", distance === 0);
          slide.tabIndex = hidden ? -1 : 0;
          slide.style.pointerEvents = hidden ? "none" : "auto";
          slide.style.zIndex = String(40 - distance * 10);
          slide.style.opacity = String(hidden ? 0 : distance === 0 ? 1 : distance === 1 ? .72 : .38);
          slide.style.filter = "blur(" + (hidden ? 10 : distance === 0 ? 0 : distance === 1 ? 2 : 5) + "px)";
          slide.style.transform = "translate(-50%, -50%) translate(" + (offset * 430) + "px, " + (distance === 0 ? -12 : distance * 18) + "px) scale(" + (distance === 0 ? 1 : distance === 1 ? .78 : .58) + ")";
        });
      }
      function go(step) { current = wrap(current + step); render(); }
      slides.forEach(function (slide, index) {
        slide.addEventListener("click", function () {
          if (Date.now() < suppressClickUntil) return;
          var offset = signedOffset(index);
          if (offset !== 0) { current = wrap(current + offset); render(); }
          window.setTimeout(function () {
            var target = document.getElementById(slide.dataset.target || "");
            if (target) window.scrollTo({ top: Math.max(0, target.getBoundingClientRect().top + window.pageYOffset - 80), behavior: "smooth" });
          }, 120);
        });
      });
      if (prev) prev.addEventListener("click", function () { go(-1); });
      if (next) next.addEventListener("click", function () { go(1); });
      carousel.addEventListener("wheel", function (event) { event.preventDefault(); go(event.deltaY > 0 || event.deltaX > 0 ? 1 : -1); }, { passive: false });
      carousel.addEventListener("pointerdown", function (event) {
        if (event.target.closest && event.target.closest(".moments-control")) return;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragPointerId = event.pointerId;
        didSwipe = false;
        carousel.classList.add("is-dragging");
        if (carousel.setPointerCapture) carousel.setPointerCapture(event.pointerId);
      });
      carousel.addEventListener("pointermove", function (event) {
        if (dragPointerId !== event.pointerId) return;
        var dx = event.clientX - dragStartX;
        var dy = event.clientY - dragStartY;
        if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.2) {
          didSwipe = true;
          event.preventDefault();
        }
      });
      function finishSwipe(event) {
        if (dragPointerId !== event.pointerId) return;
        var dx = event.clientX - dragStartX;
        var dy = event.clientY - dragStartY;
        carousel.classList.remove("is-dragging");
        if (carousel.releasePointerCapture) carousel.releasePointerCapture(event.pointerId);
        dragPointerId = null;
        if (didSwipe && Math.abs(dx) > 46 && Math.abs(dx) > Math.abs(dy) * 1.2) {
          suppressClickUntil = Date.now() + 420;
          go(dx < 0 ? 1 : -1);
        }
      }
      carousel.addEventListener("pointerup", finishSwipe);
      carousel.addEventListener("pointercancel", function (event) {
        if (dragPointerId !== event.pointerId) return;
        carousel.classList.remove("is-dragging");
        dragPointerId = null;
      });
      render();
    });
  }

  function setupPopmartSwap() {
    var cards = Array.prototype.slice.call(app.querySelectorAll(".popmart-swap-card"));
    if (!cards.length) return;
    var slots = { left: { left: 237, top: 622, width: 749, height: 1059 }, center: { left: 1036, top: 504, width: 915, height: 1294 }, right: { left: 2000, top: 622, width: 749, height: 1059 } };
    function apply(card, slotName) {
      var slot = slots[slotName];
      card.dataset.slot = slotName;
      card.style.left = slot.left + "px";
      card.style.top = slot.top + "px";
      card.style.width = slot.width + "px";
      card.style.height = slot.height + "px";
    }
    cards.forEach(function (card) {
      apply(card, card.dataset.slot || "left");
      card.addEventListener("click", function () {
        if (card.dataset.slot === "center") return;
        var center = cards.find(function (item) { return item.dataset.slot === "center"; });
        if (center) { apply(center, card.dataset.slot); apply(card, "center"); }
      });
    });
  }

  function setupWork5SeriesTabs() {
    var tabs = Array.prototype.slice.call(app.querySelectorAll(".work5-series-tab"));
    if (!tabs.length) return;
    var desc = app.querySelector("[data-series-desc]");
    var copies = Array.prototype.slice.call(app.querySelectorAll("[data-series-copy]")).reduce(function (all, item) { all[item.dataset.seriesCopy] = item.innerHTML; return all; }, {});
    function setSeries(series) {
      var showPopmart = series === "popmart";
      app.querySelectorAll('.work5-series-card[data-series="popmart"]').forEach(function (card) { card.classList.toggle("work5-series-hidden", !showPopmart); });
      app.querySelectorAll('.work5-series-card[data-series="wahaha"]').forEach(function (card) { card.classList.toggle("work5-series-hidden", showPopmart); });
      if (desc && copies[series]) desc.innerHTML = copies[series];
    }
    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        var series = tab.dataset.series || "popmart";
        tabs.forEach(function (item) {
          var active = item === tab;
          item.classList.toggle("is-active", active);
          item.setAttribute("aria-selected", active ? "true" : "false");
        });
        setSeries(series);
      });
    });
    var active = tabs.find(function (tab) { return tab.classList.contains("is-active"); });
    setSeries(active ? active.dataset.series : "popmart");
  }

  function initPage() {
    setupFixedChrome();
    fitBoards();
    setupHomeInteractions();
    setupBagInteractions();
    setupConceptItems();
    setupMenuHoldPreview();
    setupReveal();
    setupMomentsCarousel();
    setupPopmartSwap();
    setupWork5SeriesTabs();
    prepareSummaryEntrance();
    window.requestAnimationFrame(function () {
      fitBoards();
      updateFixedChrome();
    });
  }

  function renderPage(page, records, push) {
    var template = document.getElementById("page-" + page);
    if (!template) return;
    var previousPage = currentPage;
    var stableRoute = useStableRoute(previousPage, page);
    if (stableRoute && previousPage !== page) {
      app.classList.remove("route-fade-in");
      app.classList.add("route-fade");
    }
    var previousChrome = captureChromeStates();
    var ghost = previousPage === page || stableRoute ? null : createPageGhost();
    currentPage = page;
    document.title = template.dataset.title || document.title;
    app.innerHTML = template.innerHTML;
    window.scrollTo(0, 0);
    if (!stableRoute) {
      prehideIncomingPage(page, previousPage);
      prehideBridgeTargets(records || []);
    }
    initPage();
    window.requestAnimationFrame(function () {
      fitBoards();
      updateFixedChrome();
      animateFixedChromeFrom(previousChrome);
      if (!stableRoute) {
        animateBridge(records || []);
        window.requestAnimationFrame(function () {
          animateSummaryCards(records || []);
        });
        if (previousPage !== page) animateHomePiecesEntrance(records || []);
      }
      if (stableRoute && previousPage !== page) {
        window.requestAnimationFrame(function () {
          app.classList.remove("route-fade");
          app.classList.add("route-fade-in");
          if (page === "summary") {
            window.setTimeout(function () {
              animateSummaryCards([]);
            }, 120);
          }
          window.setTimeout(function () {
            app.classList.remove("route-fade-in");
          }, 560);
        });
      }
    });
    if (push) history.pushState({ page: page }, "", "#" + page);
  }

  document.addEventListener("click", function (event) {
    var link = event.target.closest && event.target.closest("a[href]");
    if (!link) return;
    var page = pageFromHref(link.getAttribute("href"));
    if (!page) return;
    event.preventDefault();
    var records = collectSources(link, page);
    renderPage(page, records, true);
  }, true);

  window.addEventListener("resize", scheduleFitBoards);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", scheduleFitBoards);
  if (window.visualViewport) window.visualViewport.addEventListener("scroll", updateFixedChrome, { passive: true });
  window.addEventListener("scroll", updateFixedChrome, { passive: true });
  ["gesturestart", "gesturechange", "gestureend"].forEach(function (name) {
    document.addEventListener(name, function (event) { event.preventDefault(); }, { passive: false });
  });
  document.addEventListener("touchmove", function (event) {
    if (event.touches && event.touches.length > 1) event.preventDefault();
  }, { passive: false });
  window.addEventListener("popstate", function () {
    var page = (location.hash || "#home").replace("#", "") || "home";
    renderPage(page === "index" ? "home" : page, [], false);
  });

  renderPage((location.hash || "#home").replace("#", "") || "home", [], false);
})();

  </script>
